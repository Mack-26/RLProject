sampling_device: "cpu"
train_device: "cuda"
buffer_device: "cpu"
share_policy_params: true
prefer_continuous_actions: false
collect_with_grad: false
parallel_collection: true

gamma: 0.99
lr: 5.0e-4
adam_eps: 1.0e-5
adam_extra_kwargs: {}
clip_grad_norm: true
clip_grad_val: 40.0

soft_target_update: true
polyak_tau: 0.005
hard_target_update_frequency: 50

exploration_eps_init: 0.6
exploration_eps_end: 0.05
exploration_anneal_frames: 1_000_000

max_n_iters: null
max_n_frames: 3_000_000

# On-policy (MAPPO / IPPO)
on_policy_collected_frames_per_batch: 6000
on_policy_n_envs_per_worker: 10
on_policy_n_minibatch_iters: 45
on_policy_minibatch_size: 400

# Off-policy (unused, but required fields)
off_policy_collected_frames_per_batch: 200
off_policy_n_envs_per_worker: 10
off_policy_n_optimizer_steps: 100
off_policy_train_batch_size: 256
off_policy_memory_size: 1_000_000
off_policy_init_random_frames: 0
off_policy_use_prioritized_replay_buffer: false
off_policy_prb_alpha: 0.6
off_policy_prb_beta: 0.4

evaluation: true
render: false
evaluation_interval: 20
evaluation_episodes: 10
evaluation_deterministic_actions: true
evaluation_static: false

loggers: []
project_name: "adaptive-mappo"
wandb_extra_kwargs: {}
create_json: true
save_folder: null
restore_file: null
restore_map_location: null
checkpoint_interval: 200
checkpoint_at_end: true
keep_checkpoints_num: 3
exclude_buffer_from_checkpoint: false
